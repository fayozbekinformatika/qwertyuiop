<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parolni tiklash - MerenHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #2d3436;
        }
        .dark-theme {
            --bg: #1a1a2e;
            --card: #16213e;
            --text: #e9ecef;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { 
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .dark-theme .container {
            background: var(--card);
            color: var(--text);
        }
        h1 { color: var(--primary); margin-bottom: 20px; }
        p { color: var(--text); margin-bottom: 20px; }
        .links a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Email yuborildi</h1>
        <p>Parolni tiklash uchun ko'rsatmalar {{ email }}} manziliga yuborildi. Iltimos, emailingizni tekshiring.</p>
        <div class="links">
            <a href="{% url 'login' %}">Kirish sahifasiga qaytish</a>
        </div>
    </div>
</body>
</html>
