<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO Muvaffaqiyatli - MerenHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen flex items-center justify-center">
    <div class="text-center">
        <div class="w-24 h-24 bg-gradient-to-br from-green-400 to-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6 text-6xl animate-bounce">
            ✓
        </div>
        <h1 class="text-4xl font-bold text-white mb-4">
            <span class="bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">PRO</span> Muvaffaqiyatli!
        </h1>
        <p class="text-gray-400 text-lg mb-2">Tabriklayman! Endi siz PRO foydalanuvchisiz!</p>
        
        <div class="bg-slate-800/50 rounded-xl p-6 max-w-md mx-auto mt-8 border border-purple-500/30">
            <div class="text-left space-y-3 text-gray-300">
                <div class="flex justify-between">
                    <span>Tranzaksiya ID:</span>
                    <span class="text-white font-mono">{{ transaction_id }}</span>
                </div>
                <div class="flex justify-between">
                    <span>Summa:</span>
                    <span class="text-white font-bold">{{ amount }} so'm</span>
                </div>
                <div class="flex justify-between">
                    <span>Muddat:</span>
                    <span class="text-green-400">30 kun</span>
                </div>
            </div>
        </div>

        <div class="mt-8 flex gap-4 justify-center">
            <a href="{% url 'test_bot' %}" class="bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white font-bold py-3 px-8 rounded-xl transition-all hover:scale-105">
                Test Botga O'tish
            </a>
            <a href="{% url 'index' %}" class="bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-8 rounded-xl transition-all">
                Asosiy Sahifaga
            </a>
        </div>
    </div>
</body>
</html>
