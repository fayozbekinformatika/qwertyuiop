<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yangi parol o'rnatish - MerenHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #2d3436;
        }
        .dark-theme {
            --bg: #1a1a2e;
            --card: #16213e;
            --text: #e9ecef;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { 
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        .dark-theme .container {
            background: var(--card);
            color: var(--text);
        }
        h1 { text-align: center; color: var(--primary); margin-bottom: 20px; }
        p { text-align: center; margin-bottom: 20px; color: var(--text); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text); }
        input { 
            width: 100%; 
            padding: 12px 15px; 
            border: 2px solid #eee; 
            border-radius: 10px; 
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            background: var(--card);
            color: var(--text);
        }
        input:focus { border-color: var(--primary); }
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover { background: #5b4cdb; }
        .error { color: red; font-size: 0.9rem; text-align: center; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Yangi parol o'rnatish</h1>
        
        {% if validlink %}
            <p>Yangi parolni kiriting.</p>
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="id_new_password1">Yangi parol</label>
                    <input type="password" name="new_password1" id="id_new_password1" required>
                </div>
                <div class="form-group">
                    <label for="id_new_password2">Parolni tasdiqlang</label>
                    <input type="password" name="new_password2" id="id_new_password2" required>
                </div>
                <button type="submit" class="btn">Parolni o'zgartirish</button>
            </form>
        {% else %}
            <p class="error">Bu tiklash havolasi noto'g'ri yoki muddati o'tgan. Iltimos, qayta urinib ko'ring.</p>
        {% endif %}
    </div>
</body>
</html>
