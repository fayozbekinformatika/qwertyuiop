<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parol o'zgartirildi - MerenHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #2d3436;
        }
        .dark-theme {
            --bg: #1a1a2e;
            --card: #16213e;
            --text: #e9ecef;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { 
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .dark-theme .container {
            background: var(--card);
            color: var(--text);
        }
        h1 { color: var(--primary); margin-bottom: 20px; }
        p { color: var(--text); margin-bottom: 20px; }
        .btn {
            display: inline-block;
            padding: 14px 24px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn:hover { background: #5b4cdb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Parol o'zgartirildi</h1>
        <p>Parolingiz muvaffaqiyatli o'zgartirildi. Endi yangi parolingiz bilan kirishingiz mumkin.</p>
        <a href="{% url 'login' %}" class="btn">Kirish</a>
    </div>
</body>
</html>
